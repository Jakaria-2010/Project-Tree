<!DOCTYPE html>
<html lang="en">

<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Organic Food Admin</title>
  
  <link rel="stylesheet" href="css/admin.css">
  
</head>

<body>
  
  <header>
    
    <div class="logo">
      🌿 Organic Food Admin
    </div>
    
    <div class="rightHeader">
      
      <div class="notification">
        
        🔔
        
        <span class="badge" id="notificationCount">
          0
        </span>
        
      </div>
      
      <div class="profile">
        
        <div id="avatar">
          A
        </div>
        
        <div class="online"></div>
        
        <div id="profileMenu">
          
          <div class="profileTop">
            
            <div class="bigAvatar" id="bigAvatar">
              A
            </div>
            
            <h3>Administrator</h3>
            
            <p id="adminEmail">
              Loading...
            </p>
            
          </div>
          
          <div class="menuItem">
            🏠 Dashboard
          </div>
          
          <div class="menuItem">
            ⚙ Website Settings
          </div>
          
          <div class="menuItem logout" onclick="logout()">
            🚪 Logout
          </div>
          
        </div>
        
      </div>
      
    </div>
    
  </header>
  
  <div class="container">
    
    <div class="cards">
      
      <div class="card">
        
        <h3>Total Orders</h3>
        
        <p id="totalOrders">
          0
        </p>
        
      </div>
      
      <div class="card">
        
        <h3>Pending</h3>
        
        <p id="pendingOrders">
          0
        </p>
        
      </div>
      
      <div class="card">
        
        <h3>Delivered</h3>
        
        <p id="deliveredOrders">
          0
        </p>
        
      </div>
      
      <div class="card">
        
        <h3>Reports</h3>
        
        <p id="totalReports">
          0
        </p>
        
      </div>
      
    </div>
    
    <div class="section">
      
      <h2>
        📦 Orders
      </h2>
      
      <div class="toolbar">
        
        <input type="text" id="searchBox" placeholder="🔍 Search by name or phone...">
        
        <select id="sortOrder">
        
          <option value="desc">
            Newest First
          </option>
          
          <option value="asc">
            Oldest First
          </option>
          
        </select>
        
      </div>
      
      <table>
        
        <thead>
          
          <tr>
            
            <th>Order ID</th>
            
            <th>Name</th>
            
            <th>Phone</th>
            
            <th>Total</th>
            
            <th>Status</th>
            
            <th>Date</th>
            
            <th>Action</th>
            
          </tr>
          
        </thead>
        
        <tbody id="ordersTable">
          
        </tbody>
        
      </table>
      
    </div>
    
    <div class="section">
      
      <h2>
        ⚠ Reports
      </h2>
      
      <table>
        
        <thead>
          
          <tr>
            
            <th>Name</th>
            
            <th>Problem</th>
            
            <th>Date</th>
            
            <th>Action</th>
            
          </tr>
          
        </thead>
        
        <tbody id="reportsTable">
          
        </tbody>
        
      </table>
      
    </div>
    
  </div>
  
  <!-- ================= ORDER MODAL ================= -->
  
  <div id="orderModal" class="modal">
    
    <div class="modalContent">
      
      <span id="closeModal">&times;</span>
      
      <h2>📦 Order Details</h2>
      
      <div id="modalBody">
        
        Loading...
        
      </div>
      
    </div>
    
  </div>
  
  <script type="module" src="js/admin.js"></script>
  
</body>

</html>
